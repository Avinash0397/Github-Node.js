name: Node.js CI-CD
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
jobs:
  compile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Use Node.js 23.x
        uses: actions/setup-node@v4
        with:
          node-version: '23'
      -  name: Install dependencies and run tests
         working-directory: client
         run: npm install 

  Gitleaks-scan:
      runs-on: ubuntu-latest
      steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Gitleaks Setup
        uses: gitleaks/gitleaks-action@v2
      - name: Run Gitleaks Scan
        run: gitleaks detect --source ./client --report-path gitleaks-report.json
